<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="SmartLender — ML-assisted loan eligibility screening platform for underwriters.">
  <title>{% block title %}Smart Lender{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <a href="{{ url_for('home') }}" class="brand" aria-label="SmartLender Home">
        <span class="mark" aria-hidden="true">SL</span>
        Smart Lender
        <span class="tagline">&nbsp;Underwriting Desk</span>
      </a>
      <nav class="topnav" aria-label="Main navigation">
        <a href="{{ url_for('home') }}" id="nav-application">Application</a>
        <a href="{{ url_for('batch') }}" id="nav-batch">Batch</a>
        <a href="{{ url_for('history') }}" id="nav-history">History</a>
        <a href="{{ url_for('reports') }}" id="nav-reports">Reports</a>
        <a href="{{ url_for('about') }}" id="nav-about">Model</a>
      </nav>
      <button id="theme-toggle" class="theme-btn" aria-label="Toggle dark mode" title="Toggle dark/light mode">
        <span class="theme-icon theme-icon-light">☀️</span>
        <span class="theme-icon theme-icon-dark">🌙</span>
      </button>
    </div>
  </div>

  {% block content %}{% endblock %}

  <footer>
    Smart Lender &mdash; ML-assisted loan eligibility screening &mdash; for decision support, not a final determination
    <span class="footer-sep">|</span>
    <a href="{{ url_for('health') }}" class="footer-link">API Status</a>
  </footer>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
